<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        header{
            background:#333;
            color:white;
            padding:15px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav a{
            color:white;
            text-decoration:none;
        }

        .hero{
            text-align:center;
            padding:100px 20px;
        }

        .hero h1{
            font-size:45px;
            color:#333;
        }

        .hero p{
            margin:20px 0;
            color:#666;
        }

        .btn{
            display:inline-block;
            background:#007BFF;
            color:white;
            padding:12px 25px;
            text-decoration:none;
            border-radius:5px;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:100px;
        }
    </style>
</head>

<body>

    <header>
        <h2>My Website</h2>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Welcome to My Website</h1>
        <p>This is a simple responsive homepage created using HTML and CSS.</p>
        <a href="#" class="btn">Get Started</a>
    </section>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
